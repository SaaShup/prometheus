global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "docker"
    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        regex: "true"
        action: keep

      - source_labels: [__meta_docker_container_label_prometheus_address]
        target_label: __address__
        replacement: "$1"

      - source_labels: [__meta_docker_container_name]
        target_label: container
      
      - source_labels: [__meta_docker_container_label_prometheus_path]
        regex: "(.+)"
        target_label: __metrics_path__
        replacement: "$1"

  - job_name: "netbox-docker-agent"
    docker_sd_configs:
      - host: unix:///var/run/docker.sock

    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_scrape_agent]
        regex: "true"
        action: keep

      - source_labels: [__meta_docker_container_label_prometheus_address]
        target_label: __address__
        replacement: "$1"

      - source_labels: [__meta_docker_container_name]
        target_label: container
      
      - source_labels: [__meta_docker_container_label_prometheus_path]
        regex: "(.+)"
        target_label: __metrics_path__
        replacement: "$1"

    basic_auth:
      username_file: /etc/prometheus/secrets/netbox-docker-agent/username
      password_file: /etc/prometheus/secrets/netbox-docker-agent/password